# Per-repo policy for the vendored sharedserver resolver beside this file.
# The resolver itself is byte-identical to upstream so drift is a plain diff.
SS_LABEL=cribsheet
# Supported baseline, not a capability boundary — nothing in the use/unuse surface
# changed across 0.5.x-0.6.x. This is simply what cribsheet is tested against.
SS_MIN_VERSION=0.6.6
# Latest, not a pin: cribsheet consumes sharedserver rather than shipping it, so
# version lockstep between them would be meaningless.
SS_INSTALLER_URL=https://github.com/georgeharker/sharedserver/releases/latest/download/sharedserver-installer.sh
