name: Release (opencode-cribsheet)

# Publishes the @geohar/opencode-cribsheet npm plugin when a version tag is pushed —
# the SAME `v*` tag that release.yml uses for PyPI, because the plugin version tracks
# the cribsheet release. The version-match check enforces that lockstep: bump
# plugins/opencode-cribsheet/package.json in the release commit or this job fails.
#
# Mirrors release.yml's shape: tag-triggered, trusted publishing (OIDC, no secrets),
# an environment gate. npm equivalent of PyPI Trusted Publishing:
#
#   One-time setup at https://www.npmjs.com/ → the package → Settings → Trusted
#   Publisher (create the publisher first if the package is new), with:
#       repository:   georgeharker/cribsheet
#       workflow:     release-opencode-plugin.yml
#       environment:  npm
#   Then create a GitHub environment named "npm" (repo Settings → Environments).
#
# No NPM_TOKEN needed once the trusted publisher is configured — OIDC authenticates
# the publish and generates provenance.

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write          # OIDC: trusted publishing + provenance
      contents: read
    defaults:
      run:
        working-directory: plugins/opencode-cribsheet
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Upgrade npm (OIDC trusted publishing needs >= 11.5.1)
        run: npm install -g npm@latest
      - name: Verify tag matches package version
        run: |
          pkg="$(node -p "require('./package.json').version")"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$pkg" != "$tag" ]; then
            echo "::error::tag v$tag does not match plugin version $pkg — bump plugins/opencode-cribsheet/package.json to match the cribsheet release"
            exit 1
          fi
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - name: Publish to npm (trusted publishing + provenance)
        run: npm publish --provenance --access public
