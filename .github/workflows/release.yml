name: Release (cribsheet)

# Publishes the `cribsheet` package to PyPI when a version tag is pushed:
#   git tag v0.1.0 && git push origin v0.1.0
#
# NOTE: cribsheet depends on `polyllmkit` from PyPI, so publish polyllmkit FIRST
# (georgeharker/llmkit release.yml) or this build resolves nothing to install.
#
# Auth — pick one in the `publish` job below:
#   A) Trusted Publishing (OIDC) — DEFAULT, no secrets. One-time PyPI setup at
#      https://pypi.org/manage/account/publishing/ (pending publisher), with:
#         PyPI project:  cribsheet
#         owner/repo:    georgeharker/cribsheet
#         workflow:      release.yml
#         environment:   pypi
#   B) API token — set repo secret PYPI_API_TOKEN and uncomment `password:` below.
#
# Create a GitHub environment named "pypi" (Settings -> Environments) to gate
# releases with required reviewers (recommended for both options).

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The version lives in ONE place — pyproject.toml; __version__ is derived
      # from it at runtime via importlib.metadata. The tag is the only other
      # location, so refuse to release when it doesn't match the source.
      - name: Verify tag matches pyproject version
        run: |
          pkg="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$pkg" != "$tag" ]; then
            echo "::error::tag v$tag does not match pyproject version $pkg — bump pyproject.toml in the release commit"
            exit 1
          fi
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Build sdist + wheel
        run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write          # required for option A (Trusted Publishing / OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Option A (trusted publishing): leave `password` unset — OIDC is used automatically.
          # Option B (API token): uncomment the next line and set the PYPI_API_TOKEN secret.
          # password: ${{ secrets.PYPI_API_TOKEN }}
          # TestPyPI instead? add:  repository-url: https://test.pypi.org/legacy/
          attestations: true

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write          # required to create the GitHub Release
    steps:
      - uses: actions/checkout@v4   # for --generate-notes (needs the tag + history)
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        # --generate-notes auto-builds notes from merged PRs/commits since the previous tag;
        # the built sdist + wheel are attached as downloadable assets.
        run: gh release create "${GITHUB_REF_NAME}" dist/* --title "${GITHUB_REF_NAME}" --generate-notes
